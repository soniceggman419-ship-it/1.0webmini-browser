<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Times New Roman", Times, serif;
  background: #c0c0c0;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}
.container {
  text-align: center;
  padding: 40px;
  background: #e8e8e8;
  border: 2px outset #fff;
  box-shadow: 4px 4px 0 #888;
}
h1 {
  font-size: 28px;
  color: #222;
  margin-bottom: 4px;
}
.sub {
  font-size: 13px;
  color: #666;
  margin-bottom: 20px;
}
.search-box {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-bottom: 16px;
}
input {
  width: 300px;
  padding: 8px;
  border: 2px inset #fff;
  font-size: 14px;
  font-family: monospace;
}
button {
  padding: 8px 16px;
  border: 2px outset #fff;
  background: #dcdcdc;
  font-weight: bold;
  cursor: pointer;
  font-size: 14px;
}
button:active {
  border: 2px inset #fff;
}
.links {
  margin-top: 16px;
  font-size: 14px;
}
.links a {
  color: #00a;
  text-decoration: underline;
  margin: 0 8px;
  cursor: pointer;
}
.hint {
  font-size: 12px;
  color: #666;
  margin-top: 16px;
}
@media (max-width: 500px) {
  .container { padding: 20px; }
  input { width: 180px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>Mini Browser</h1>
  <div class="sub">Web 1.0 Edition</div>
  <div class="search-box">
    <input type="text" id="urlInput" placeholder="https://example.com" autofocus />
    <button id="goBtn">Go</button>
  </div>
  <div class="links">
    <a href="#" onclick="nav('int://help');return false">Help</a>
    <a href="#" onclick="nav('int://about');return false">About</a>
  </div>
  <div class="hint">
    Enter a URL or use <b>int://</b> for internal pages
  </div>
</div>
<script>
function nav(url) {
  window.parent.postMessage({ type: "navigate", url }, "*");
}

const input = document.getElementById("urlInput");
const btn = document.getElementById("goBtn");

function go() {
  let url = input.value.trim();
  if (!url) return;
  if (!url.startsWith("http") && !url.startsWith("int://")) {
    url = "https://" + url;
  }
  window.parent.postMessage({ type: "navigate", url }, "*");
}

btn.addEventListener("click", go);
input.addEventListener("keypress", (e) => {
  if (e.key === "Enter") go();
});
</script>
</body>
</html>
